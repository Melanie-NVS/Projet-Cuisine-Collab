<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion | Accédez à votre espace recettes</title>
  <meta name="description"
    content="Connectez-vous à votre compte pour ajouter des recettes, commenter et sauvegarder vos plats préférés." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="../styles/index.css" />
</head>

<body>
  <section class="signIn">
    <div class="inscription">
      <h1>Bon retour en cuisine !</h1>
      <ul>
        <li>
          <a href="https://facebook.com" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        </li>
        <li>
          <a href="https://www.google.fr" target="_blank" aria-label="Google +"><i
              class="fa-brands fa-google-plus-g"></i></a>
        </li>
        <li>
          <a href="https://linkedin.com" target="_blank" aria-label="LinkedIn"><i
              class="fa-brands fa-linkedin-in"></i></a>
        </li>
      </ul>
      <p>Ou utilisez votre compte email :</p>
      <form action="">
        <label for="email">Email</label>
        <input type="text" id="email" placeholder="chef@exemple.com" required />
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="********" required />
        <p>Mot de passe oublié ?</p>
        <div class="submit-container">
          <input type="submit" class="btn" value="Me connecter" />
        </div>
      </form>
    </div>
    <div class="imgSignUp">
      <h1>Bonjour ! Rejoignez-nous</h1>
      <p>Inscrivez-vous pour partager vos meilleures recettes.</p>
      <button class="btn">S'inscrire</button>
    </div>
  </section>
  <script src="../Javascript/index.js"></script>
</body>

</html>
